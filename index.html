<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Numbers Memory Game</title>
</head>

<body>
    <div class='top'>
        <div id='title'>
            <h3>NMG</h3>
        </div>
    </div>

    <div id='score'>
        <p>Score: <span id='score-value'>0</span></p>
    </div>

    <div class='mid'>
        <div id='number-display'>
            <h1 id='number-text'>432</h1>
        </div>

        <div id="answer-input">
            <input id='user-answer' type="number" name="">
        </div>
    </div>

    <div class='bottom'>
        <div id='message'>
            <p>Hit <strong>Enter</strong> to Start</p>
        </div>
    </div>

    <div class='game-over'>
        <h1>Game Over</h1>
    </div>





    <script src="script.js"></script>
</body>

</html>
